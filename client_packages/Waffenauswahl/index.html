<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>&copy;Waffenauswahl</title>
        <link rel='stylesheet' type='text/css' media='screen' href='./css/main.css'>
        <link href="https://fonts.googleapis.com/css2?family=Poppins&amp;display=swap" rel="stylesheet">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    </head>
    <body>
	<div class="box">
		<!-- Waffen Hintergrund Box-->
		<div id="wbox1"></div>
		<div id="wbox2"></div>
		<div id="wbox3"></div>
		<div id="wbox4"></div>
		
	  <!-- Waffen Auswählen Button-->
	  <!-- <div class="kit-window"> -->
		<div class="kit-text">
			<div class="kits" id="kit-1">Auswählen</div>
			<div class="kits2" id="kit-2">Auswählen</div>
			<div class="kits3" id="kit-3">Auswählen</div>
			<div class="kits4" id="kit-4">Auswählen</div>
		</div>
		
	   <!-- Waffen Box Rot Name-->
	   <div class="waffensetname">
		<div class="one-bar">Waffenset Gusenberg</div>
		<div class="one-bar2">Waffenset Advanced</div>
		<div class="one-bar3">Waffenset Carbine</div>
		<div class="one-bar4">Waffenset Bullpup</div>
	   </div>
		
	   <!-- Waffen Name-->
	   <div class="waffennamen">
		<div class="waffennameadv">ADVANCED RIFLE</div>
		<div class="waffennamecar">CARBINE RIFLE</div>
		<div class="waffennamegusi">GUSENBERG</div>
		<div class="waffennamebullp">BULLPUP RIFLE</div>
		<div class="waffennamepistoladv">SCHWERE PISTOLE</div>
		<div class="waffennamepistolcar">SCHWERE PISTOLE</div>
		<div class="waffennamepistolgusi">SCHWERE PISTOLE</div>
		<div class="waffennamepistolbullp">SCHWERE PISTOLE</div>
		<div class="waffennameaxtadv">BATTLE AXE</div>
		<div class="waffennameaxtcar">BATTLE AXE</div>
		<div class="waffennameaxtgusi">BATTLE AXE</div>
		<div class="waffennameaxtbullp">BATTLE AXE</div>
	   </div>
		
	   <!-- Waffen Bilder-->
	   <div class="waffenbilder">
		<div class="waffenbildadv"></div>
		<div class="waffenbildpistoladv"></div>
		<div class="waffenbildaxtadv"></div>
	   </div>
		
		<div class="waffenbildcar"></div>
		<div class="waffenbildpistolcar"></div>
		<div class="waffenbildaxtcar"></div>
		
		<div class="waffenbildgusi"></div>
		<div class="waffenbildpistolgusi"></div>
		<div class="waffenbildaxtgusi"></div>
		
		<div class="waffenbildbullp"></div>
		<div class="waffenbildpistolbullp"></div>
		<div class="waffenbildaxtbullp"></div>
		
	   <!-- Exit button Box-->
		<!-- <div class="exitbg"></div> -->
		<div class="exit" id="exitButton"></div>
        </div>
        <script src="./js/app.js"></script>
    </body>
</html>
