<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>K-Crimelife Fahrzeug-HUD</title>
    <link rel="stylesheet" href="../ui/theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="vehicle-hud" class="vehicle-hud is-hidden" aria-label="Fahrzeuganzeige">
        <div class="dial-shell">
            <svg class="speed-arc" viewBox="0 0 240 220" aria-hidden="true">
                <path class="arc-track" pathLength="100" d="M35 174 A92 92 0 1 1 205 174"/>
                <path id="speed-progress" class="arc-progress" pathLength="100" d="M35 174 A92 92 0 1 1 205 174"/>
                <g class="arc-ticks">
                    <path d="M38 176l10-5M31 145l12-2M33 113l12 2M45 83l11 6M65 59l9 9M91 43l5 11M120 37v12M149 43l-5 11M175 59l-9 9M195 83l-11 6M207 113l-12 2M209 145l-12-2M202 176l-10-5"/>
                </g>
            </svg>

            <div class="speed-readout">
                <span id="speed" class="speed-value">0</span>
                <span class="speed-unit">KM/H</span>
                <span id="gear" class="gear-value">N</span>
            </div>

            <div class="vehicle-status">
                <div id="fuel-status" class="status-item fuel-status" title="Tankfüllstand">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 3h9v18H6zM8.5 6h4M15 8h2l2 2v7.5a1.5 1.5 0 0 0 3 0V8l-2-2"/>
                    </svg>
                    <span id="fuel">--</span>
                </div>
                <div id="lock-status" class="status-item lock-status is-unlocked" title="Fahrzeug entriegelt">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="5" y="10" width="14" height="11" rx="2"/>
                        <path id="lock-shackle" d="M8 10V7a4 4 0 0 1 7.4-2.1"/>
                    </svg>
                    <span id="lock-label">OFFEN</span>
                </div>
            </div>

            <div id="engine-indicator" class="engine-indicator" title="Motorstatus">
                <span></span>MOTOR
            </div>
        </div>

        <div class="distance-row" title="Kilometerstand">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="6" cy="17" r="2"/><circle cx="18" cy="17" r="2"/>
                <path d="M8 17h8M4 14l2-6h10l4 6M8 8l1.5-3h5L16 8"/>
            </svg>
            <span id="mileage">--</span>
            <small>KM</small>
        </div>
    </section>
    <script src="ui.js"></script>
</body>
</html>
