<script>
let speedoc = document.getElementById("speedoclass")
let KMH = document.getElementById('KMH')
speedoclass.style.display = "none";
let blocknone = 0;


function speed(speed)

{			
    let KM = document.getElementById('KM').innerHTML = speed + " KM/H";
}

function engine(running)
{			
    if(running) {
        document.getElementById('on').src = "img/on.png";
    }
    else
    {
        document.getElementById('on').src = "img/off.png";
    }
    
}

function locked(lock)
{			
    if(lock == 2) {
        document.getElementById('lock').src = "img/locked.png";
    }
    else
    {
        document.getElementById('lock').src = "img/unlocked.png";
    }
    
}

//

function show() {
    speedoclass.style.display = "block";
}

function hide() {
    speedoclass.style.display = "none";
}

</script>
