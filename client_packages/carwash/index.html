<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Carwash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./node_modules/toastr/build/toastr.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
     <div class="main">
         <div class="rep">
             <img src="./img/k-logo.png" alt="auto car">
             <h2 class="carname"></h2>
             <div class="repCar">
                <div class="box1 car-fix">
                    <i class="fa fa-usd" > 1000</i>
                    <h1 class="wash">Auto Waschen</h1>   
                </div>
             </div>
             <h2 class="closebg"></h2>
			 <div class="close" onclick="mp.trigger('closeBrowser');"></div>

             
         </div>
             <div class="one-bar">Sauberes Auto - Gute Laune </div>
			 <!-- <div class="one-bar2">Benutze jetzt die Waschstraße</div> -->
			 <!-- <div class="one-bar3">Sauberes Auto - Gute Laune </div> -->

     </div>
     <script>
         document.querySelector(".close").addEventListener("click",closeWeb)
         function closeWeb(){
            mp.trigger('closeBrowser');
         }

         document.querySelector(".wash").addEventListener("click", clearncar)

         function clearncar(){
         //   toastr.info('Are you the 6 fingered man?')
            mp.trigger('cleanCar');
            
         }

         document.querySelector(".btn-ok-repair").addEventListener("click",fixCar)

            function fixCar(){
            mp.trigger('fixCar');
            }
         
         function start(car){
            document.querySelector(".carname").innerText = car
         }
     </script>
     <script src="./node_modules/toastr/build/toastr.min.js"></script>
</body>
</html>
