<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>K-Crimelife HUD</title>
    <link rel="stylesheet" href="../ui/theme.css">
    <link rel="stylesheet" href="Time.css">
</head>
<body>
    <aside id="player-hud" class="player-hud" aria-label="Spieler-HUD mit Sprechreichweiten-Anzeige">
        <div class="hud-segment hud-money" title="Bargeld">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2v20M17 6.2c-.9-1.1-2.5-1.8-4.5-1.8-2.7 0-4.7 1.4-4.7 3.5 0 5.2 9.2 2.2 9.2 7 0 2.1-2 3.6-4.8 3.6-2.2 0-4.1-.8-5.2-2.2"/>
            </svg>
            <span id="money">0</span>
        </div>

        <div id="black-money-segment" class="hud-segment hud-black-money is-hidden" title="Schwarzgeld">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 4h8l-1.4 3H9.4L8 4Zm-1 5h10c2.2 2.4 3.5 5.2 3.5 7.5 0 3.1-3.1 4.5-8.5 4.5s-8.5-1.4-8.5-4.5C3.5 14.2 4.8 11.4 7 9Z"/>
            </svg>
            <span id="black-money">0</span>
        </div>

        <div id="voice-range" class="hud-segment hud-voice range-normal" title="Sprechreichweite: Normal (16 Meter)" aria-label="Sprechreichweite: Normal, 16 Meter">
            <svg class="voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="3" width="6" height="11" rx="3"/>
                <path d="M6.5 11.5a5.5 5.5 0 0 0 11 0M12 17v4M8.5 21h7"/>
            </svg>
            <div class="voice-signal" aria-hidden="true">
                <i></i><i></i><i></i>
            </div>
            <span id="voice-range-label">16 m</span>
            <span class="kui-sr-only">Sprechreichweite</span>
        </div>

        <div class="hud-segment hud-needs" title="Essen und Trinken">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 3v7M4.8 3v5.5C4.8 10 5.7 11 7 11s2.2-1 2.2-2.5V3M7 11v10M16.5 3v18M16.5 3c3 1.4 3.7 5.8 0 8"/>
            </svg>
            <i id="food-status" class="need-dot status-good"></i>
            <i id="drink-status" class="need-dot status-good"></i>
        </div>

        <div id="admin-duty" class="hud-segment hud-admin is-hidden" title="Admin-Dienst">AD</div>
    </aside>
    <script src="hud-ui.js"></script>
</body>
</html>
